name: 🚀 Release

on:
  push:
    tags:
      - 'v*.*.*'           # v1.2.0
      - 'v*.*.*-*'         # v1.2.0-stable, v1.2.0-beta
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.2.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release?'
        required: false
        default: 'false'
        type: boolean
      draft:
        description: 'Save as draft first?'
        required: false
        default: 'false'
        type: boolean

env:
  APP_NAME: ssh-ws
  GO_VERSION: '1.22'

permissions:
  contents: write
  discussions: write

jobs:
  # ─────────────────────────────────────────────
  #  Validate Tag & Prepare
  # ─────────────────────────────────────────────
  prepare:
    name: 📋 Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
      changelog: ${{ steps.changelog.outputs.content }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract release metadata
        id: meta
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"

          # Detect pre-release
          IS_PRE="false"
          if [[ "$TAG" =~ -(alpha|beta|rc|dev|pre) ]] || [[ "${{ github.event.inputs.prerelease }}" == "true" ]]; then
            IS_PRE="true"
          fi

          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "is_prerelease=${IS_PRE}" >> $GITHUB_OUTPUT

          echo "📌 Tag: ${TAG}"
          echo "📦 Version: ${VERSION}"
          echo "🔖 Pre-release: ${IS_PRE}"

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${{ steps.meta.outputs.tag }}"

          # Get previous tag
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -1)

          if [[ -z "$PREV_TAG" ]]; then
            echo "No previous tag found, using all commits"
            COMMITS=$(git log --pretty=format:"- %s (%h)" | head -50)
          else
            echo "Comparing ${TAG} to ${PREV_TAG}"
            COMMITS=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD")
          fi

          # Categorize commits
          FEATURES=$(echo "$COMMITS" | grep -iE "^- (feat|add|new)" || true)
          FIXES=$(echo "$COMMITS" | grep -iE "^- (fix|bug|patch|hotfix)" || true)
          PERF=$(echo "$COMMITS" | grep -iE "^- (perf|optim|speed)" || true)
          DOCS=$(echo "$COMMITS" | grep -iE "^- (doc|readme|changelog)" || true)
          REFACTOR=$(echo "$COMMITS" | grep -iE "^- (refactor|clean|style)" || true)
          OTHERS=$(echo "$COMMITS" | grep -viE "^- (feat|add|new|fix|bug|patch|hotfix|perf|optim|doc|readme|changelog|refactor|clean|style)" || true)

          CONTENT="## 🚀 What's New in ${TAG}"$'\n\n'

          if [[ -n "$FEATURES" ]]; then
            CONTENT+="### ✨ Features"$'\n'"$FEATURES"$'\n\n'
          fi

          if [[ -n "$FIXES" ]]; then
            CONTENT+="### 🐛 Bug Fixes"$'\n'"$FIXES"$'\n\n'
          fi

          if [[ -n "$PERF" ]]; then
            CONTENT+="### ⚡ Performance"$'\n'"$PERF"$'\n\n'
          fi

          if [[ -n "$REFACTOR" ]]; then
            CONTENT+="### 🔧 Improvements"$'\n'"$REFACTOR"$'\n\n'
          fi

          if [[ -n "$DOCS" ]]; then
            CONTENT+="### 📚 Documentation"$'\n'"$DOCS"$'\n\n'
          fi

          if [[ -n "$OTHERS" ]]; then
            CONTENT+="### 🔄 Other Changes"$'\n'"$OTHERS"$'\n\n'
          fi

          if [[ -n "$PREV_TAG" ]]; then
            CONTENT+="**Full Changelog**: [\`${PREV_TAG}...${TAG}\`](../../compare/${PREV_TAG}...${TAG})"$'\n\n'
          fi

          CONTENT+="---"$'\n'
          CONTENT+="_Built with Go ${{ env.GO_VERSION }} · Auto-generated by GitHub Actions_"

          # Save to file (avoid delimiter issues)
          echo "$CONTENT" > /tmp/changelog.md
          cat /tmp/changelog.md

          # Output for next step
          {
            echo "content<<CHANGELOG_EOF"
            cat /tmp/changelog.md
            echo "CHANGELOG_EOF"
          } >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────
  #  Build All Platforms
  # ─────────────────────────────────────────────
  build:
    name: 🏗️ Build [${{ matrix.label }}]
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux ──────────────────────────────
          - { goos: linux,   goarch: amd64,   runner: ubuntu-latest,  ext: '',     label: linux-amd64 }
          - { goos: linux,   goarch: arm64,   runner: ubuntu-latest,  ext: '',     label: linux-arm64 }
          - { goos: linux,   goarch: arm,     goarm: '7', runner: ubuntu-latest, ext: '', label: linux-armv7 }
          - { goos: linux,   goarch: arm,     goarm: '6', runner: ubuntu-latest, ext: '', label: linux-armv6 }
          - { goos: linux,   goarch: '386',   runner: ubuntu-latest,  ext: '',     label: linux-386 }
          - { goos: linux,   goarch: mips,    gomips: softfloat, runner: ubuntu-latest, ext: '', label: linux-mips-softfloat }
          - { goos: linux,   goarch: mipsle,  gomips: softfloat, runner: ubuntu-latest, ext: '', label: linux-mipsle-softfloat }
          - { goos: linux,   goarch: mips64,  runner: ubuntu-latest,  ext: '',     label: linux-mips64 }
          - { goos: linux,   goarch: mips64le,runner: ubuntu-latest,  ext: '',     label: linux-mips64le }
          - { goos: linux,   goarch: riscv64, runner: ubuntu-latest,  ext: '',     label: linux-riscv64 }
          # ── Windows ────────────────────────────
          - { goos: windows, goarch: amd64,   runner: ubuntu-latest,  ext: '.exe', label: windows-amd64 }
          - { goos: windows, goarch: arm64,   runner: ubuntu-latest,  ext: '.exe', label: windows-arm64 }
          - { goos: windows, goarch: '386',   runner: ubuntu-latest,  ext: '.exe', label: windows-386 }
          # ── macOS ──────────────────────────────
          - { goos: darwin,  goarch: amd64,   runner: macos-latest,   ext: '',     label: darwin-amd64 }
          - { goos: darwin,  goarch: arm64,   runner: macos-latest,   ext: '',     label: darwin-arm64 }
          # ── BSD ────────────────────────────────
          - { goos: freebsd, goarch: amd64,   runner: ubuntu-latest,  ext: '',     label: freebsd-amd64 }
          - { goos: freebsd, goarch: arm64,   runner: ubuntu-latest,  ext: '',     label: freebsd-arm64 }
          - { goos: openbsd, goarch: amd64,   runner: ubuntu-latest,  ext: '',     label: openbsd-amd64 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build binary
        id: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          GOMIPS: ${{ matrix.gomips }}
          CGO_ENABLED: 0
        run: |
          OUTPUT="${{ env.APP_NAME }}-${{ needs.prepare.outputs.tag }}-${{ matrix.label }}${{ matrix.ext }}"

          LDFLAGS="-s -w"
          LDFLAGS="${LDFLAGS} -X 'main.Version=${{ needs.prepare.outputs.tag }}'"
          LDFLAGS="${LDFLAGS} -X 'main.Credits=Risqi Nur Fadhilah'"
          LDFLAGS="${LDFLAGS} -X 'main.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
          LDFLAGS="${LDFLAGS} -X 'main.Commit=$(git rev-parse --short HEAD)'"

          mkdir -p dist

          CGO_ENABLED=0 go build \
            -trimpath \
            -ldflags "${LDFLAGS}" \
            -o "dist/${OUTPUT}" \
            .

          echo "output=${OUTPUT}" >> $GITHUB_OUTPUT
          ls -lh "dist/${OUTPUT}"

      - name: Generate checksum
        id: checksum
        run: |
          cd dist
          OUTPUT="${{ steps.build.outputs.output }}"
          sha256sum "${OUTPUT}" | tee "${OUTPUT}.sha256"
          echo "sha256=$(sha256sum "${OUTPUT}" | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Create archive
        id: archive
        run: |
          cd dist
          OUTPUT="${{ steps.build.outputs.output }}"
          VERSION="${{ needs.prepare.outputs.tag }}"
          LABEL="${{ matrix.label }}"

          # Create README for archive
          cat > README.txt << EOF
          ssh-ws (GO-TUNNEL PRO)
          Version : ${VERSION}
          Platform: ${LABEL}
          SHA256  : ${{ steps.checksum.outputs.sha256 }}
          Author  : Risqi Nur Fadhilah
          License : MIT

          Usage: ./${OUTPUT} -p 8080 -t 127.0.0.1:22
          Docs  : https://github.com/risqinf/websocket-proxy
          EOF

          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            ARCHIVE="${{ env.APP_NAME }}-${VERSION}-${LABEL}.zip"
            zip "${ARCHIVE}" "${OUTPUT}" "${OUTPUT}.sha256" README.txt
          else
            ARCHIVE="${{ env.APP_NAME }}-${VERSION}-${LABEL}.tar.gz"
            tar -czf "${ARCHIVE}" "${OUTPUT}" "${OUTPUT}.sha256" README.txt
          fi

          echo "archive=${ARCHIVE}" >> $GITHUB_OUTPUT
          ls -lh "${ARCHIVE}"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.label }}
          path: |
            dist/${{ steps.archive.outputs.archive }}
            dist/${{ steps.build.outputs.output }}.sha256
          retention-days: 1
          if-no-files-found: error

  # ─────────────────────────────────────────────
  #  Create GitHub Release
  # ─────────────────────────────────────────────
  release:
    name: 📦 Publish Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: |
          echo "📦 Release assets:"
          ls -lhR release-assets/
          echo ""
          echo "Total files: $(find release-assets -type f | wc -l)"

      - name: Generate combined checksums
        run: |
          find release-assets -name "*.sha256" -exec cat {} \; | sort > release-assets/checksums.txt
          echo ""
          echo "📋 checksums.txt:"
          cat release-assets/checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: "🚀 ${{ env.APP_NAME }} ${{ needs.prepare.outputs.tag }}"
          body: |
            ${{ needs.prepare.outputs.changelog }}

            ## 📥 Download

            | Platform | Architecture | File |
            |----------|-------------|------|
            | 🐧 Linux | amd64 | `ssh-ws-${{ needs.prepare.outputs.tag }}-linux-amd64.tar.gz` |
            | 🐧 Linux | arm64 | `ssh-ws-${{ needs.prepare.outputs.tag }}-linux-arm64.tar.gz` |
            | 🐧 Linux | armv7 | `ssh-ws-${{ needs.prepare.outputs.tag }}-linux-armv7.tar.gz` |
            | 🐧 Linux | armv6 | `ssh-ws-${{ needs.prepare.outputs.tag }}-linux-armv6.tar.gz` |
            | 🐧 Linux | 386 | `ssh-ws-${{ needs.prepare.outputs.tag }}-linux-386.tar.gz` |
            | 🐧 Linux | mips | `ssh-ws-${{ needs.prepare.outputs.tag }}-linux-mips-softfloat.tar.gz` |
            | 🐧 Linux | mipsle | `ssh-ws-${{ needs.prepare.outputs.tag }}-linux-mipsle-softfloat.tar.gz` |
            | 🐧 Linux | mips64 | `ssh-ws-${{ needs.prepare.outputs.tag }}-linux-mips64.tar.gz` |
            | 🐧 Linux | mips64le | `ssh-ws-${{ needs.prepare.outputs.tag }}-linux-mips64le.tar.gz` |
            | 🐧 Linux | riscv64 | `ssh-ws-${{ needs.prepare.outputs.tag }}-linux-riscv64.tar.gz` |
            | 🪟 Windows | amd64 | `ssh-ws-${{ needs.prepare.outputs.tag }}-windows-amd64.zip` |
            | 🪟 Windows | arm64 | `ssh-ws-${{ needs.prepare.outputs.tag }}-windows-arm64.zip` |
            | 🪟 Windows | 386 | `ssh-ws-${{ needs.prepare.outputs.tag }}-windows-386.zip` |
            | 🍎 macOS | amd64 | `ssh-ws-${{ needs.prepare.outputs.tag }}-darwin-amd64.tar.gz` |
            | 🍎 macOS | arm64 (M1/M2) | `ssh-ws-${{ needs.prepare.outputs.tag }}-darwin-arm64.tar.gz` |
            | 😈 FreeBSD | amd64 | `ssh-ws-${{ needs.prepare.outputs.tag }}-freebsd-amd64.tar.gz` |
            | 😈 FreeBSD | arm64 | `ssh-ws-${{ needs.prepare.outputs.tag }}-freebsd-arm64.tar.gz` |
            | 🐡 OpenBSD | amd64 | `ssh-ws-${{ needs.prepare.outputs.tag }}-openbsd-amd64.tar.gz` |

            ## ✅ Verify Integrity

            ```bash
            # Download and verify
            sha256sum -c checksums.txt
            ```

            ## ⚡ Quick Start

            ```bash
            # Linux/macOS
            tar -xzf ssh-ws-${{ needs.prepare.outputs.tag }}-linux-amd64.tar.gz
            chmod +x ssh-ws-${{ needs.prepare.outputs.tag }}-linux-amd64
            ./ssh-ws-${{ needs.prepare.outputs.tag }}-linux-amd64 -p 8080 -t 127.0.0.1:22

            # Windows (PowerShell)
            Expand-Archive ssh-ws-${{ needs.prepare.outputs.tag }}-windows-amd64.zip
            .\ssh-ws-${{ needs.prepare.outputs.tag }}-windows-amd64.exe -p 8080 -t 127.0.0.1:22
            ```

          files: |
            release-assets/**/*.tar.gz
            release-assets/**/*.zip
            release-assets/checksums.txt
          draft: ${{ github.event.inputs.draft == 'true' }}
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}
          make_latest: ${{ needs.prepare.outputs.is_prerelease == 'false' }}
          fail_on_unmatched_files: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release summary
        run: |
          echo "# 🚀 Release Published!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tag**: \`${{ needs.prepare.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: \`${{ needs.prepare.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Pre-release**: \`${{ needs.prepare.outputs.is_prerelease }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📦 Assets Published" >> $GITHUB_STEP_SUMMARY
          find release-assets -type f | sort | while read f; do
            SIZE=$(du -sh "$f" | cut -f1)
            NAME=$(basename "$f")
            echo "- \`${NAME}\` (${SIZE})" >> $GITHUB_STEP_SUMMARY
          done
