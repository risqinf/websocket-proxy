name: 🚀 Release

# ─────────────────────────────────────────────────────────────────────────────
#  Trigger: push tag v*.*.* ATAU manual dari tab Actions → Run workflow
#  Fix:
#    - body changelog ditulis ke file → hindari YAML parse error
#    - pakai `gh release create` (built-in di runner) → tidak depend action pihak-3
#    - `go mod download` dihapus, diganti `go mod tidy`
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.3.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      draft:
        description: 'Save as draft?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  APP_NAME:    ssh-ws
  GO_VERSION:  '1.22'
  MODULE_NAME: ssh-ws

permissions:
  contents: write
  discussions: write

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  #  1 · Prepare
  # ───────────────────────────────────────────────────────────────────────────
  prepare:
    name: 📋 Prepare
    runs-on: ubuntu-latest
    outputs:
      tag:           ${{ steps.meta.outputs.tag }}
      version:       ${{ steps.meta.outputs.version }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract metadata
        id: meta
        run: |
          # Resolve tag: dari input manual atau dari git ref
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi

          VERSION="${TAG#v}"

          IS_PRE="false"
          if [[ "$TAG" =~ -(alpha|beta|rc|dev|pre) ]]; then
            IS_PRE="true"
          fi
          if [[ "${{ github.event.inputs.prerelease }}" == "true" ]]; then
            IS_PRE="true"
          fi

          echo "tag=${TAG}"             >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}"     >> "$GITHUB_OUTPUT"
          echo "is_prerelease=${IS_PRE}" >> "$GITHUB_OUTPUT"

          echo "Tag     : ${TAG}"
          echo "Version : ${VERSION}"
          echo "Pre-rel : ${IS_PRE}"

      # ── Changelog ditulis ke file ────────────────────────────────────────
      # PENTING: jangan inject changelog langsung ke body: YAML karena
      # karakter spesial (backtick, hash, quote) akan merusak YAML parser.
      - name: Generate changelog file
        id: changelog
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          PREV=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -1 || true)

          if [[ -z "$PREV" ]]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" | head -50)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" "${PREV}..HEAD")
          fi

          # Kategorisasi commit
          FEATURES=$(echo "$COMMITS" | grep -iE "^- (feat|add|new)"    || true)
          FIXES=$(   echo "$COMMITS" | grep -iE "^- (fix|bug|patch)"   || true)
          PERF=$(    echo "$COMMITS" | grep -iE "^- (perf|optim)"      || true)
          REFACTOR=$(echo "$COMMITS" | grep -iE "^- (refactor|clean)"  || true)
          DOCS=$(    echo "$COMMITS" | grep -iE "^- (doc|readme)"      || true)
          OTHERS=$(  echo "$COMMITS" | grep -viE \
            "^- (feat|add|new|fix|bug|patch|perf|optim|doc|readme|refactor|clean)" || true)

          # Tulis ke file – AMAN dari YAML injection
          {
            echo "## 🚀 What's New in ${TAG}"
            echo ""

            if [[ -n "$FEATURES" ]]; then
              echo "### ✨ Features"
              echo "$FEATURES"
              echo ""
            fi
            if [[ -n "$FIXES" ]]; then
              echo "### 🐛 Bug Fixes"
              echo "$FIXES"
              echo ""
            fi
            if [[ -n "$PERF" ]]; then
              echo "### ⚡ Performance"
              echo "$PERF"
              echo ""
            fi
            if [[ -n "$REFACTOR" ]]; then
              echo "### 🔧 Improvements"
              echo "$REFACTOR"
              echo ""
            fi
            if [[ -n "$DOCS" ]]; then
              echo "### 📚 Docs"
              echo "$DOCS"
              echo ""
            fi
            if [[ -n "$OTHERS" ]]; then
              echo "### 🔄 Other Changes"
              echo "$OTHERS"
              echo ""
            fi

            if [[ -n "$PREV" ]]; then
              echo "**Full Changelog**: [\`${PREV}...${TAG}\`](../../compare/${PREV}...${TAG})"
              echo ""
            fi

            echo "---"
            echo ""
            echo "## 📥 Download"
            echo ""
            echo "| Platform | Arch | File |"
            echo "|----------|------|------|"
            echo "| 🐧 Linux | amd64 | \`${APP_NAME}-${TAG}-linux-amd64.tar.gz\` |"
            echo "| 🐧 Linux | arm64 | \`${APP_NAME}-${TAG}-linux-arm64.tar.gz\` |"
            echo "| 🐧 Linux | armv7 | \`${APP_NAME}-${TAG}-linux-armv7.tar.gz\` |"
            echo "| 🐧 Linux | armv6 | \`${APP_NAME}-${TAG}-linux-armv6.tar.gz\` |"
            echo "| 🐧 Linux | 386   | \`${APP_NAME}-${TAG}-linux-386.tar.gz\` |"
            echo "| 🐧 Linux | mips  | \`${APP_NAME}-${TAG}-linux-mips-softfloat.tar.gz\` |"
            echo "| 🐧 Linux | mipsle | \`${APP_NAME}-${TAG}-linux-mipsle-softfloat.tar.gz\` |"
            echo "| 🐧 Linux | mips64 | \`${APP_NAME}-${TAG}-linux-mips64.tar.gz\` |"
            echo "| 🐧 Linux | mips64le | \`${APP_NAME}-${TAG}-linux-mips64le.tar.gz\` |"
            echo "| 🐧 Linux | riscv64 | \`${APP_NAME}-${TAG}-linux-riscv64.tar.gz\` |"
            echo "| 🪟 Windows | amd64 | \`${APP_NAME}-${TAG}-windows-amd64.zip\` |"
            echo "| 🪟 Windows | arm64 | \`${APP_NAME}-${TAG}-windows-arm64.zip\` |"
            echo "| 🪟 Windows | 386   | \`${APP_NAME}-${TAG}-windows-386.zip\` |"
            echo "| 🍎 macOS | amd64 | \`${APP_NAME}-${TAG}-darwin-amd64.tar.gz\` |"
            echo "| 🍎 macOS | arm64 | \`${APP_NAME}-${TAG}-darwin-arm64.tar.gz\` |"
            echo "| 😈 FreeBSD | amd64 | \`${APP_NAME}-${TAG}-freebsd-amd64.tar.gz\` |"
            echo "| 😈 FreeBSD | arm64 | \`${APP_NAME}-${TAG}-freebsd-arm64.tar.gz\` |"
            echo "| 🐡 OpenBSD | amd64 | \`${APP_NAME}-${TAG}-openbsd-amd64.tar.gz\` |"
            echo ""
            echo "## ✅ Verify"
            echo ""
            echo "\`\`\`bash"
            echo "sha256sum -c checksums.txt"
            echo "\`\`\`"
            echo ""
            echo "## ⚡ Quick Start"
            echo ""
            echo "\`\`\`bash"
            echo "# Linux"
            echo "tar -xzf ${APP_NAME}-${TAG}-linux-amd64.tar.gz"
            echo "chmod +x ${APP_NAME}-${TAG}-linux-amd64"
            echo "./${APP_NAME}-${TAG}-linux-amd64 -p 2080 -t 127.0.0.1:22"
            echo "\`\`\`"
            echo ""
            echo "_Built with Go \${{ env.GO_VERSION }} · GitHub Actions_"
          } > /tmp/release-body.md

          cat /tmp/release-body.md
        env:
          TAG: ${{ steps.meta.outputs.tag }}

      - name: Upload changelog artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-body
          path: /tmp/release-body.md
          retention-days: 1

  # ───────────────────────────────────────────────────────────────────────────
  #  2 · Build matrix
  # ───────────────────────────────────────────────────────────────────────────
  build:
    name: 🏗️ Build [${{ matrix.label }}]
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - { goos: linux,   goarch: amd64,    runner: ubuntu-latest, ext: '',     label: linux-amd64             }
          - { goos: linux,   goarch: arm64,    runner: ubuntu-latest, ext: '',     label: linux-arm64             }
          - { goos: linux,   goarch: arm,      goarm: '7', runner: ubuntu-latest, ext: '', label: linux-armv7    }
          - { goos: linux,   goarch: arm,      goarm: '6', runner: ubuntu-latest, ext: '', label: linux-armv6    }
          - { goos: linux,   goarch: '386',    runner: ubuntu-latest, ext: '',     label: linux-386               }
          - { goos: linux,   goarch: mips,     gomips: softfloat, runner: ubuntu-latest, ext: '', label: linux-mips-softfloat   }
          - { goos: linux,   goarch: mipsle,   gomips: softfloat, runner: ubuntu-latest, ext: '', label: linux-mipsle-softfloat }
          - { goos: linux,   goarch: mips64,   runner: ubuntu-latest, ext: '',     label: linux-mips64            }
          - { goos: linux,   goarch: mips64le, runner: ubuntu-latest, ext: '',     label: linux-mips64le          }
          - { goos: linux,   goarch: riscv64,  runner: ubuntu-latest, ext: '',     label: linux-riscv64           }
          # Windows
          - { goos: windows, goarch: amd64,    runner: ubuntu-latest, ext: '.exe', label: windows-amd64           }
          - { goos: windows, goarch: arm64,    runner: ubuntu-latest, ext: '.exe', label: windows-arm64           }
          - { goos: windows, goarch: '386',    runner: ubuntu-latest, ext: '.exe', label: windows-386             }
          # macOS
          - { goos: darwin,  goarch: amd64,    runner: macos-latest,  ext: '',     label: darwin-amd64            }
          - { goos: darwin,  goarch: arm64,    runner: macos-latest,  ext: '',     label: darwin-arm64            }
          # BSD
          - { goos: freebsd, goarch: amd64,    runner: ubuntu-latest, ext: '',     label: freebsd-amd64           }
          - { goos: freebsd, goarch: arm64,    runner: ubuntu-latest, ext: '',     label: freebsd-arm64           }
          - { goos: openbsd, goarch: amd64,    runner: ubuntu-latest, ext: '',     label: openbsd-amd64           }

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Initialize Go module
        run: |
          if [ ! -f go.mod ]; then
            go mod init ${{ env.MODULE_NAME }}
          fi
          go mod tidy

      - name: Build
        id: build
        env:
          GOOS:        ${{ matrix.goos }}
          GOARCH:      ${{ matrix.goarch }}
          GOARM:       ${{ matrix.goarm }}
          GOMIPS:      ${{ matrix.gomips }}
          CGO_ENABLED: 0
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          OUT="${{ env.APP_NAME }}-${TAG}-${{ matrix.label }}${{ matrix.ext }}"
          mkdir -p dist

          LDFLAGS="-s -w"
          LDFLAGS="${LDFLAGS} -X 'main.Version=${TAG}'"
          LDFLAGS="${LDFLAGS} -X 'main.Credits=Risqi Nur Fadhilah'"
          LDFLAGS="${LDFLAGS} -X 'main.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
          LDFLAGS="${LDFLAGS} -X 'main.Commit=$(git rev-parse --short HEAD)'"

          CGO_ENABLED=0 go build -trimpath -ldflags "${LDFLAGS}" -o "dist/${OUT}" .

          echo "output=${OUT}" >> "$GITHUB_OUTPUT"
          ls -lh "dist/${OUT}"

      - name: Checksum
        id: checksum
        run: |
          cd dist
          sha256sum "${{ steps.build.outputs.output }}" | tee "${{ steps.build.outputs.output }}.sha256"

      - name: Archive
        id: archive
        run: |
          cd dist
          OUT="${{ steps.build.outputs.output }}"
          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            ARCH="${OUT%.exe}.zip"
            zip "${ARCH}" "${OUT}" "${OUT}.sha256"
          else
            ARCH="${OUT}.tar.gz"
            tar -czf "${ARCH}" "${OUT}" "${OUT}.sha256"
          fi
          echo "archive=${ARCH}" >> "$GITHUB_OUTPUT"
          ls -lh "${ARCH}"

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.label }}
          path: |
            dist/${{ steps.archive.outputs.archive }}
            dist/${{ steps.build.outputs.output }}.sha256
          retention-days: 1
          if-no-files-found: error

  # ───────────────────────────────────────────────────────────────────────────
  #  3 · Publish – pakai `gh` CLI bawaan runner (tidak perlu action pihak-3)
  # ───────────────────────────────────────────────────────────────────────────
  release:
    name: 📦 Publish
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Download semua artifact build + changelog
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Merge checksums
        run: |
          find release-assets -name "*.sha256" -exec cat {} \; \
            | sort > release-assets/checksums.txt
          echo "── checksums.txt ──"
          cat release-assets/checksums.txt

      - name: List assets
        run: ls -lhR release-assets/

      # ── gh release create (built-in, tidak perlu PAT atau action pihak-3) ─
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG:          ${{ needs.prepare.outputs.tag }}
          IS_PRE:       ${{ needs.prepare.outputs.is_prerelease }}
          IS_DRAFT:     ${{ github.event.inputs.draft == 'true' }}
        run: |
          # Flag pre-release / draft
          FLAGS=""
          [[ "$IS_PRE"   == "true" ]] && FLAGS="${FLAGS} --prerelease"
          [[ "$IS_DRAFT" == "true" ]] && FLAGS="${FLAGS} --draft"
          [[ "$IS_PRE"   != "true" ]] && FLAGS="${FLAGS} --latest"

          # Buat release dengan body dari file (AMAN dari injection)
          gh release create "${TAG}" \
            --title "🚀 ${{ env.APP_NAME }} ${TAG}" \
            --notes-file release-assets/release-body.md \
            $FLAGS \
            release-assets/*.tar.gz \
            release-assets/*.zip \
            release-assets/checksums.txt

      - name: Summary
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          {
            echo "# 🚀 Release Published"
            echo ""
            echo "| Key | Value |"
            echo "|-----|-------|"
            echo "| Tag | \`${TAG}\` |"
            echo "| Pre-release | \`${{ needs.prepare.outputs.is_prerelease }}\` |"
            echo "| Assets | $(find release-assets -type f | wc -l) files |"
          } >> "$GITHUB_STEP_SUMMARY"
